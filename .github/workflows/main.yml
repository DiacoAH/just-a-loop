name: Download from commit message (debug)

on:
  push:
    branches:
      - main          # Change to your default branch if different (e.g., master)

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    # Only run if commit message does NOT contain '[skip ci]'
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show commit message
        run: |
          echo "Full commit message:"
          echo "${{ github.event.head_commit.message }}"

      - name: Extract URL (verbose)
        id: extract
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          echo "Commit message: $COMMIT_MSG"
          
          # Try to extract any http/https URL (supports common variations)
          URL=$(echo "$COMMIT_MSG" | grep -oE 'https?://[a-zA-Z0-9./?=_-]*' | head -1)
          
          if [ -z "$URL" ]; then
            echo "❌ No URL found in commit message."
            echo "url_found=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "✅ Found URL: $URL"
          echo "url_found=true" >> $GITHUB_OUTPUT
          echo "download_url=$URL" >> $GITHUB_OUTPUT

      - name: Download file
        if: steps.extract.outputs.url_found == 'true'
        run: |
          URL="${{ steps.extract.outputs.download_url }}"
          mkdir -p downloads
          cd downloads
          echo "Downloading from $URL"
          curl -v -L -O "$URL" || { echo "Download failed"; exit 1; }
          echo "Downloaded files:"
          ls -la

      - name: Commit and push changes
        if: steps.extract.outputs.url_found == 'true'
        run: |
          # Check if downloads folder has new content
          if [ -z "$(ls -A downloads 2>/dev/null)" ]; then
            echo "No files in downloads folder. Nothing to commit."
            exit 0
          fi
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          
          # Verify if there are changes to commit
          if git diff --cached --quiet; then
            echo "No new changes to commit (files may already be tracked and identical)."
            exit 0
          fi
          
          git commit -m "Add downloaded file(s) [skip ci]"
          git push
